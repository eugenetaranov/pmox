#cloud-config
# pmox starter cloud-init. Generated by `pmox configure`.
# Edit this file to customize packages, users, runcmd, or network
# config. Every `pmox launch` and `pmox clone` against this server
# uploads this file as the VM's user-data. When you change it,
# terminate the running VM and relaunch for the new config to take
# effect.

users:
  - name: {{.User}}
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - {{.SSHPubkey}}

package_update: true
packages:
  - qemu-guest-agent

runcmd:
  - systemctl enable --now qemu-guest-agent
