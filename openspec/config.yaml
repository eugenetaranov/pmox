schema: spec-driven

context: |
  pmox is a single static Go binary — a multipass-style CLI for spinning
  up and managing ephemeral VMs on a remote Proxmox VE cluster via the
  PVE HTTP API. It does not run on the Proxmox host.

  Project shape, build pipeline, flag/env conventions, OpenSpec workflow,
  README tone, and llms.txt structure are mirrored from tackhq/tack:
    https://github.com/tackhq/tack

  Tech stack:
    - Go 1.24 (pure Go, no CGo)
    - Cobra v1.8.x for CLI wiring (no viper; hand-rolled flag/env helpers)
    - gopkg.in/yaml.v3 for config files
    - github.com/zalando/go-keyring for cross-platform secret storage
    - net/http for the PVE API client (small typed wrapper, no SDK)
    - golang.org/x/crypto/ssh for the SSH wait helper
    - testify for table-driven tests
    - GoReleaser v2 for releases; Homebrew tap at eugenetaranov/homebrew-tap

  Conventions inherited from tack:
    - cmd/pmox/main.go holds Cobra wiring for most commands inline.
      Only commands large enough to deserve their own file (e.g. configure,
      launch) get split out as siblings. No file-per-trivial-command.
    - Flag/env pairing is explicit: flagOrEnv(cmd, "name", "PMOX_NAME").
      No automatic binding.
    - Workflow files are .yaml not .yml. CI file is ci.yaml.
    - golangci-lint v1.64 with --timeout=3m.
    - GoReleaser builds linux+darwin × amd64+arm64. No Windows.
    - Release workflow polls CI via gh CLI before running goreleaser.
    - All non-public code lives under internal/. No pkg/ directory.
    - No log package; verbose/debug bools threaded through, stderr writes
      via fmt.Fprintln at call sites.

  Out of scope for v1 (do not propose changes for these):
    - LXC containers
    - Snapshots
    - Multi-VM launch (--count)
    - pmox shell / pmox exec
    - Host directory mounts
    - Networking beyond DHCP on the default bridge
    - Windows builds

rules:
  proposal:
    - Keep proposals tight. Match tack's archived proposal style:
      ## Why, ## What Changes, ## Capabilities, ## Impact.
    - Reference tack precedent when mirroring a convention.
  spec:
    - "Use OpenSpec scenario format: '### Requirement:' followed by '#### Scenario:' with WHEN/THEN bullets."
