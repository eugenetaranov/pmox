#cloud-config
# Example cloud-init user-data for pmox.
#
# pmox does not take a --cloud-init flag. Instead, every launch/clone
# uploads the per-server file at ~/.config/pmox/cloud-init/<slug>.yaml
# as the VM's user-data. `pmox configure` writes a working starter
# file on first run; edit it in place to add packages, users, runcmd,
# write_files, network config, etc. To regenerate a fresh default,
# run `pmox configure --regen-cloud-init`.
#
# This file is a reference snapshot of what a minimal working
# cloud-init looks like. Copy it into
# ~/.config/pmox/cloud-init/<slug>.yaml (replacing the ssh key) if
# you want to bootstrap by hand instead of going through `configure`.

users:
  - name: pmox
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAA... replace-with-your-key

package_update: true
packages:
  - qemu-guest-agent

runcmd:
  - systemctl enable --now qemu-guest-agent
